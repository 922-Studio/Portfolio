services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GA_MEASUREMENT_ID: G-1GSBD62ZVM
    container_name: portfolio
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`gregor.922-studio.com`)"
      - "traefik.http.routers.portfolio.entrypoints=web"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3000"
      - "traefik.http.routers.portfolio-root.rule=Host(`922-studio.com`)"
      - "traefik.http.routers.portfolio-root.entrypoints=web"
      - "traefik.http.routers.portfolio-root.middlewares=redirect-to-gregor"
      - "traefik.http.routers.portfolio-root.service=portfolio"
      - "traefik.http.middlewares.redirect-to-gregor.redirectregex.regex=^https?://922-studio\\.com(.*)"
      - "traefik.http.middlewares.redirect-to-gregor.redirectregex.replacement=https://gregor.922-studio.com$${1}"
      - "traefik.http.middlewares.redirect-to-gregor.redirectregex.permanent=true"
      - "922.group=Live Pages"

networks:
  proxy:
    external: true
